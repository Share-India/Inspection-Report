version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: policysquare_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-policysquare_commercial}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - policysquare_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: policysquare_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-policysquare_commercial}
    networks:
      - policysquare_network

  nginx:
    build:
      context: ./policysquare
      dockerfile: Dockerfile
    container_name: policysquare_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
    networks:
      - policysquare_network


volumes:
  pgdata:

networks:
  policysquare_network:
    driver: bridge
